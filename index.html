        tailwind.config = {
            darkMode: 'class',

                extend: {
                    fontFamily: {

                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)', filter: 'blur(60px)' },

                            '100%': { transform: 'translate(-10px, 10px) scale(0.9)', filter: 'blur(60px)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },

    <style>
        :root {
            /* Light Mode Glass */
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-header: rgba(248, 250, 252, 0.85);
        }

        .dark {
            /* Dark Mode Glass */
            --glass: rgba(10, 10, 15, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-header: rgba(3, 3, 5, 0.9);
        }

        body {
            height: 100dvh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.12) 0%, transparent 50%);
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .glass-header {
            background: var(--glass-header);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .tab-content { display: none; height: 100%; width: 100%; flex-direction: column; padding-bottom: 100px; }
        .tab-content.active { display: flex; animation: slideUp 0.4s ease-out forwards; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .CodeMirror {
            background: transparent !important;
            font-size: 14px;
            height: 100%;
        }

        /* --- PLOT WINDOW FIX --- */
        #plot-target {
            width: 100% !important;
            height: 100% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            overflow: hidden !important;
            position: relative !important;
            border-radius: 16px;
        }

        #plot-target canvas { width: 100% !important; height: auto !important; max-height: 100% !important; display: block !important; margin: auto !important; }
        #plot-target div[id^="matplotlib"] { background: transparent !important; border: none !important; width: 100% !important; }
        #plot-target .matplotlib-toolbar { display: none !important; }
        #plot-target span { display: none !important; }
        body > div[id^="matplotlib"], body > canvas { position: fixed !important; top: -5000px !important; visibility: hidden !important; }

        .accessory-bar button { flex-shrink: 0; min-width: 44px; height: 44px; }
        ::-webkit-scrollbar { width: 0px; height: 0px; }

        /* Mobile specific lab cards adaptation */
        .lab-card-mobile { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); padding: 12px 16px; border-radius: 16px; display: flex; align-items: center; font-size: 12px; font-weight: 600; color: #475569; text-align: left; transition: transform 0.2s; }
        .dark .lab-card-mobile { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; }
        .lab-card-mobile:active { transform: scale(0.98); }

        .completed-lab { color: #4ade80 !important; border-color: #4ade8022 !important; }

    <script>
        // --- SNATCHER TO PREVENT STRAY PLOTS ---
        const plotSnatcher = new MutationObserver((mutations) => {
            for (const mutation of mutations) {
                for (const node of mutation.addedNodes) {
                    if (node.id && node.id.startsWith('matplotlib')) {
                        const target = document.getElementById('plot-target');
                        if (target) {
                            target.innerHTML = ''; 
                            target.appendChild(node);
                        }
                    }
                }
            }
        });
        plotSnatcher.observe(document.body, { childList: true });

        let pyodide = null, micropip = null, completedLabs = new Set();
        const outputElement = document.getElementById("output"), statusText = document.getElementById("status-text"), statusInd = document.getElementById("status-indicator"), runBtn = document.getElementById("run-btn");

        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), { 
            mode: { name: "python", version: 3 }, 
            theme: "nord", 
            lineNumbers: true, 
            indentUnit: 4, 
            autoCloseBrackets: true, 
            styleActiveLine: true, 
            lineWrapping: true,
            inputStyle: "contenteditable", 
            spellcheck: false,
            autocorrect: false,
            autocapitalize: false
        });

        // ==========================================
        // THEME ENGINE (LIGHT & DARK MODE)
        // ==========================================
        let isDarkMode = localStorage.getItem('omni_theme') !== 'light';

        function applyTheme() {
            const icon = document.querySelector('#theme-toggle i');
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                editor.setOption('theme', 'nord');
                icon.className = 'fa-solid fa-sun text-amber-400';
            } else {
                document.documentElement.classList.remove('dark');
                editor.setOption('theme', 'default');
                icon.className = 'fa-solid fa-moon text-indigo-500';
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('omni_theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        }

        // Apply on initial load
        applyTheme();

        // ==========================================
        // DUAL-LAYER CONTINUOUS BACKSPACE FIX
        // ==========================================
        editor.on("keydown", function(cm, e) {
            if (e.keyCode === 8 || e.key === "Backspace") {
                const cursor = cm.getCursor();
                if (cursor.ch === 0 && cursor.line > 0) {
                    e.preventDefault();
                    cm.execCommand("delCharBefore");
                }
            }
        });

        const inputField = editor.display.input.getField();
        if (inputField) {
            inputField.addEventListener("beforeinput", function(e) {
                if (e.inputType && e.inputType.startsWith("delete")) {
                    const cursor = editor.getCursor();
                    if (cursor.ch === 0 && cursor.line > 0) {
                        e.preventDefault();
                        editor.execCommand("delCharBefore");
                    }
                }
            });
        }

        const defaultCode = `# Omni-Studio | Lab Editor\nprint(">>> System Ready")`;
        const savedCode = localStorage.getItem("omni_pro_v4");
        editor.setValue(savedCode || defaultCode);
        editor.on("change", () => localStorage.setItem("omni_pro_v4", editor.getValue()));

        // Boot core immediately
        window.addEventListener('DOMContentLoaded', () => {
            initPyodide(); 
        });

        async function initPyodide() {
            const bootBtn = document.getElementById("boot-btn");
            const bootStatus = document.getElementById("boot-status");

            try {
                if(bootStatus) bootStatus.innerText = "Downloading Python Engine (Cached after 1st load)...";
                
                // Initialize high-speed cloud engine
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.29.3/full/"
                });
                
                if(bootStatus) bootStatus.innerText = "Fetching Graphing Libraries...";
                
                // This successfully grabs the visual packages from the cloud
                await pyodide.loadPackage(["micropip", "matplotlib"]);
                micropip = pyodide.pyimport("micropip");
                
                if(bootStatus) bootStatus.innerText = "Configuring Input Stream...";
                await pyodide.runPythonAsync(`import builtins\nfrom js import prompt\ndef custom_input(p=""):\n val = prompt(p)\n print(f"{p}{val}")\n return val\nbuiltins.input = custom_input`);
                pyodide.setStdout({ batched: (msg) => log(msg) });
                
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-green-500 dark:bg-green-400 shadow-[0_0_6px_#4ade80]";
                statusText.innerText = "Online"; statusText.className = "text-[9px] font-bold uppercase tracking-tighter text-green-600 dark:text-green-400";
                runBtn.disabled = false; document.getElementById("mem-usage").classList.remove("hidden");
                refreshFileList(); loadProgress();

                if(bootBtn) {
                    bootBtn.innerHTML = '<div class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_#4ade80]"></div> System Ready';
                    bootBtn.className = "w-full py-4 glass-panel rounded-2xl font-bold text-slate-800 dark:text-white flex items-center justify-center gap-3";
                }
                if(bootStatus) bootStatus.innerText = "Entering Workspace...";
                
                setTimeout(enterStudio, 800);

            } catch (err) { 
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-red-500"; statusText.innerText = "Error"; statusText.className = "text-[9px] font-bold uppercase tracking-tighter text-red-500";
                if(bootBtn) bootBtn.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500"></i> Offline Mode';
                
                console.error("Pyodide Load Error:", err);
                if(bootStatus) bootStatus.innerText = "Network Error: Could not connect to Pyodide Cloud.";
                
                setTimeout(enterStudio, 2000);
            }
        }

        function handlePythonError(err) {
            const errStr = err.toString();
            let lineNum = "Unknown";
            const lineMatch = errStr.match(/File "<exec>", line (\d+)/);
            if (lineMatch) lineNum = lineMatch[1];
            
            const lines = errStr.split('\n').filter(l => l.trim().length > 0);
            let errMsg = lines[lines.length - 1].replace("PythonError: ", "").trim();
            
            let tip = "Check for typos or syntax issues.";
            if (errMsg.includes("NameError")) tip = "You are using a variable or function that hasn't been defined yet.";
            else if (errMsg.includes("SyntaxError")) tip = "Check your punctuation, brackets, quotes, and commas.";
            else if (errMsg.includes("TypeError")) tip = "You are mixing incompatible data types (like adding a string to a number).";
            else if (errMsg.includes("IndentationError")) tip = "Check the spacing at the start of your lines. Python relies on strict indentation.";
            else if (errMsg.includes("IndexError")) tip = "You are trying to access an item in a list that doesn't exist.";
            else if (errMsg.includes("FileNotFoundError")) tip = "The file you are trying to read does not exist in the virtual environment.";
            
            const formattedError = `❌ ERROR ON LINE ${lineNum}\n\n${errMsg}\n\n💡 Tip: ${tip}`;
            log(formattedError, "text-red-600 dark:text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-xl mt-2 mb-2 font-mono text-[10px] leading-relaxed shadow-sm");
        }

        async function runCode() {
            const code = editor.getValue();
            if(!code.trim()) return;
            runBtn.disabled = true;
            document.getElementById("mem-bar").style.width = "90%";
            if(code.includes("matplotlib") || code.includes("plt.")) switchTab('plots'); else switchTab('terminal');
            try {
                if (code.includes("matplotlib")) {
                     preparePlots();
                     const themeString = isDarkMode ? "dark_background" : "default";
                     await pyodide.runPythonAsync(`import matplotlib\nimport matplotlib.pyplot as plt\nmatplotlib.use("module://matplotlib_pyodide.html5_canvas_backend")\nplt.close('all')\nplt.style.use('${themeString}')\nplt.rcParams['figure.autolayout'] = True`);
                     window.document.pyodideMplTarget = document.getElementById("plot-target");
                }
                await pyodide.runPythonAsync(code);
                checkLabCompletion(code);
            } catch (err) { 
                handlePythonError(err);
            } finally { 
                runBtn.disabled = false; document.getElementById("mem-bar").style.width = "30%"; 
            }
        }

        async function installDataScience() {
            if (!micropip) { alert("System starting. Please wait..."); return; }
            const bar = document.getElementById("ds-status").firstElementChild;
            bar.style.width = "50%";
            switchTab('terminal');
            log("Installing Data Science packages (NumPy, SciPy, Matplotlib)...", "text-indigo-600 dark:text-indigo-400");
            try {
                await micropip.install(['numpy', 'scipy', 'matplotlib']);
                bar.style.width = "100%";
                bar.classList.replace("bg-indigo-500", "bg-green-500");
                log("Data Science Pack fully installed!", "text-green-600 dark:text-green-400");
            } catch (e) {
                bar.style.width = "0%";
                log("Installation failed: " + e, "text-red-600 dark:text-red-400");
            }
        }

        document.getElementById("pip-input").addEventListener("keypress", async function(e) {
            if (e.key === "Enter") {
                const pkg = this.value.trim();
                if (!pkg || !micropip) return;
                this.value = "";
                switchTab('terminal');
                log(`Installing package '${pkg}'...`, "text-indigo-600 dark:text-indigo-400");
                try {
                    await micropip.install(pkg);
                    log(`Package '${pkg}' installed successfully!`, "text-green-600 dark:text-green-400");
                } catch(err) {
                    log(`Failed to install '${pkg}': ${err}`, "text-red-600 dark:text-red-400");
                }
            }
        });

        function enterStudio() { const s = document.getElementById('splash-screen'); s.style.opacity = '0'; setTimeout(() => { s.style.display = 'none'; editor.refresh(); }, 700); }
        function switchTab(id) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById(`tab-${id}`).classList.add('active'); document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.target === id)); if(id === 'editor') setTimeout(() => editor.refresh(), 50); }
        function log(msg, cls="text-emerald-700 dark:text-emerald-400") { const d = document.createElement("div"); d.className = cls + " mb-1"; d.innerText = msg; outputElement.appendChild(d); outputElement.scrollTop = outputElement.scrollHeight; }
        function clearTerminal() { outputElement.innerHTML=""; }
        function clearEditor() { if(confirm("Clear Script?")) editor.setValue("# New Script\n"); }
        function insert(t) { const d = editor.getDoc(), c = d.getCursor(); d.replaceRange(t, c); if(t.includes('()')||t.includes('[]')||t.includes('\'\'')) d.setCursor({line:c.line, ch:c.ch+1}); editor.focus(); }
        
        function backspaceCode() { editor.execCommand("delCharBefore"); editor.focus(); }

        function preparePlots() { if(document.getElementById("plot-placeholder")) document.getElementById("plot-placeholder").style.display='none'; document.getElementById("btn-download-plot").classList.remove("hidden"); }
        function clearPlots() { document.getElementById("plot-target").innerHTML = `<div id="plot-placeholder" class="text-center opacity-20 dark:opacity-10 text-slate-800 dark:text-white"><i class="fa-solid fa-chart-area text-5xl mb-2"></i><p class="text-[10px] font-mono uppercase">No Data</p></div>`; document.getElementById("btn-download-plot").classList.add("hidden"); }
        function downloadPlot() { const c = document.querySelector("#plot-target canvas"); if(c) { const a = document.createElement('a'); a.download='OmniPlot.png'; a.href=c.toDataURL(); a.click(); } }

        // ==========================================
        // OPTIMIZED LAB MODULE SNIPPETS FROM PDF
        // ==========================================
        const snippets = {
            lab_1: `# 1. Triangle Area\nbase = float(input("Enter the base: "))\nheight = float(input("Enter the height: "))\narea = 0.5 * base * height\nprint(f"The area of the triangle is: {area}")`,
            lab_2: `# 2. Get largest number\nmy_list = [14, 58, 2, 99, 31, 7]\nlargest = max(my_list)\nprint(f"Largest number: {largest}")`,
            lab_3: `# 3. Sort Dictionary\nmy_dict = {'apple': 50, 'banana': 20, 'cherry': 85, 'date': 15}\ndict_asc = dict(sorted(my_dict.items(), key=lambda item: item[1]))\ndict_desc = dict(sorted(my_dict.items(), key=lambda item: item[1], reverse=True))\nprint(f"Ascending: {dict_asc}")\nprint(f"Descending: {dict_desc}")`,
            lab_4: `# 4. Create a set\nmy_first_set = {1, 2, 3, 4, 5}\nmy_second_set = set([5, 6, 7, 8, 9, 9, 9])\nprint(f"Set 1: {my_first_set}")\nprint(f"Set 2: {my_second_set}")`,
            lab_5: `# 5. Union of Sets\nset_a = {1, 2, 3, 4}\nset_b = {3, 4, 5, 6}\nunion_set = set_a | set_b\nprint(f"Union Set: {union_set}")`,
            lab_6: `# 6. Read CSV as a list\nimport csv\n\n# NOTE: Creating a dummy CSV file so it works in browser!\nwith open('data.csv', 'w') as f: f.write("Name,Age\\nAlice,22\\nBob,25")\n\ntry:\n    with open('data.csv', 'r') as file:\n        csv_reader = csv.reader(file)\n        data_list = list(csv_reader)\n        print(data_list)\nexcept FileNotFoundError:\n    print("Error: 'data.csv' not found.")`,
            lab_7: `# 7. Bar Chart\nimport matplotlib.pyplot as plt\n\nlanguages = ['Java', 'Python', 'PHP', 'JavaScript', 'C#', 'C++']\npopularity = [22.2, 17.6, 8.8, 8.0, 7.7, 6.7]\n\nplt.bar(languages, popularity, color='skyblue')\nplt.xlabel('Programming Languages')\nplt.ylabel('Popularity (%)')\nplt.title('Popularity of Programming Languages')\nplt.tight_layout()\nplt.show()`,
            lab_8: `# 8. Olympic Pie Chart\nimport csv\nimport matplotlib.pyplot as plt\n\n# NOTE: Creating dummy CSV file so it works in browser!\nwith open('medals.csv', 'w') as f: f.write("Country,Gold Medals\\nUSA,46\\nGBR,27\\nChina,26\\nRussia,19")\n\ncountries = []\nmedals = []\n\ntry:\n    with open('medals.csv', 'r') as file:\n        csv_reader = csv.reader(file)\n        next(csv_reader)\n        for row in csv_reader:\n            countries.append(row[0])\n            medals.append(int(row[1]))\n\n    plt.pie(medals, labels=countries, autopct='%1.1f%%', startangle=140, shadow=True)\n    plt.title('Gold Medal Achievements 2016')\n    plt.axis('equal')\n    plt.show()\nexcept FileNotFoundError:\n    print("Error: 'medals.csv' not found.")`,
            data_science: `# AI Matplotlib Visuals\nimport matplotlib.pyplot as plt\nimport numpy as np\n\nx = np.linspace(0, 10, 100)\ny = np.sin(x)\nplt.figure(figsize=(6,4))\nplt.plot(x, y, color='#6366f1', lw=3)\nplt.title("System Signal Output")\nplt.show()`
        };

        function loadSnippet(k) { if(confirm("Load Lab Code?")) { editor.setValue(snippets[k]); switchTab('editor'); } }
        function checkLabCompletion(code) { for (let k in snippets) if (code.trim() === snippets[k].trim()) markLabDone(k); }
        function markLabDone(k) { completedLabs.add(k); const btn = document.getElementById(`${k}_btn`); if (btn) btn.classList.add("completed-lab"); saveProgress(); updateProgressUI(); }
        function updateProgressUI() { const total = 8, percent = Math.round((completedLabs.size / total) * 100); if(document.getElementById("progress-percent")) document.getElementById("progress-percent").innerText = `${percent}%`; if(document.getElementById("progress-bar")) document.getElementById("progress-bar").style.width = `${percent}%`; }
        function saveProgress() { localStorage.setItem("omni_progress_v4", JSON.stringify([...completedLabs])); }
        function loadProgress() { const data = localStorage.getItem("omni_progress_v4"); if (data) { const arr = JSON.parse(data); arr.forEach(k => { completedLabs.add(k); const btn = document.getElementById(`${k}_btn`); if (btn) btn.classList.add("completed-lab"); }); updateProgressUI(); } }
        function saveFile() { const n = document.getElementById("filename-input").value; if(!n) return; const s = JSON.parse(localStorage.getItem("omni_local_v4")||"{}"); s[n] = editor.getValue(); localStorage.setItem("omni_local_v4", JSON.stringify(s)); refreshFileList(); }
        function refreshFileList() { const l = document.getElementById("file-list"); l.innerHTML=""; const s = JSON.parse(localStorage.getItem("omni_local_v4")||"{}"); Object.keys(s).forEach(k => { const d = document.createElement("div"); d.className = "flex justify-between items-center p-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/5 dark:border-white/5"; d.innerHTML = `<span class="text-[10px] text-slate-800 dark:text-white font-mono">${k}</span><div class="flex gap-3"><button onclick="editor.setValue(JSON.parse(localStorage.getItem('omni_local_v4'))['${k}']);switchTab('editor')" class="text-indigo-600 dark:text-indigo-400"><i class="fa-solid fa-folder-open"></i></button><button onclick="deleteFile('${k}')" class="text-red-500/50"><i class="fa-solid fa-trash"></i></button></div>`; l.appendChild(d); }); }
        function deleteFile(k) { if(confirm("Delete?")) { const x = JSON.parse(localStorage.getItem('omni_local_v4')); delete x[k]; localStorage.setItem('omni_local_v4', JSON.stringify(x)); refreshFileList(); } }
    </script>
